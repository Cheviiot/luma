name: Update Packages

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-packages
  cancel-in-progress: false

jobs:
  update:
    name: Check and update package versions
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl jq binutils tar xz-utils shellcheck shfmt

      - name: Check updates
        id: check
        run: |
          set +e
          .github/scripts/package-update.sh check-all | tee updates.txt
          status="${PIPESTATUS[0]}"
          set -e

          if [[ "$status" -eq 10 ]]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          elif [[ "$status" -eq 0 ]]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            exit "$status"
          fi

          {
            echo "## Package version state"
            echo
            echo '```text'
            cat updates.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply updates
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set -euo pipefail
          .github/scripts/package-update.sh apply-all

      - name: Validate updated files
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set -euo pipefail
          find . -path './.git' -prune -o \( -name 'Staplerfile' -o -name '*.sh' -o -path '*/.stapler/*' \) -type f -print0 |
            xargs -0 -r bash -n
          find . -path './.git' -prune -o \( -name '*.sh' -o -path '*/.stapler/*' \) -type f -print0 |
            xargs -0 -r shellcheck
          find . -path './.git' -prune -o \( -name 'Staplerfile' -o -name '*.sh' -o -path '*/.stapler/*' \) -type f -print0 |
            xargs -0 -r shfmt -d -i 4
          git diff --check
          .github/scripts/validate-repo.py

      - name: Prepare Pull Request body
        if: steps.check.outputs.has_updates == 'true'
        run: |
          {
            echo "## Package updates"
            echo
            echo "Automated update generated by Luma package updater."
            echo
            echo '```text'
            cat updates.txt
            echo '```'
          } > "${RUNNER_TEMP}/pr-body.md"

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update package versions"
          title: "chore: update package versions"
          body-path: ${{ runner.temp }}/pr-body.md
          branch: auto-update/packages
          delete-branch: true
          labels: |
            automated
            packages
