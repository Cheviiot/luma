name: Test Packages

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - '*/Staplerfile'
      - '*/postinstall.sh'
      - '*/postremove.sh'
      - 'stapler-repo.toml'
      - 'README.md'
  pull_request:
    paths:
      - '.github/**'
      - '*/Staplerfile'
      - '*/postinstall.sh'
      - '*/postremove.sh'
      - 'stapler-repo.toml'
      - 'README.md'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to test, or empty for all packages'
        required: false
        default: ''
      run_lifecycle:
        description: 'Run package build/install/remove test'
        type: boolean
        default: true
      run_matrix:
        description: 'Run distro build matrix'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: test-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: |
          set -euo pipefail
          bash -n .github/lib/common.sh
          bash -n .github/scripts/update-versions.sh
          bash -n .github/test/test-packages.sh
          bash -n .github/test/test-distros.sh
          find . -path './.git' -prune -o -name 'Staplerfile' -type f -print0 | xargs -0 -r bash -n
          find . -path './.git' -prune -o -name 'postinstall.sh' -type f -print0 | xargs -0 -r bash -n
          find . -path './.git' -prune -o -name 'postremove.sh' -type f -print0 | xargs -0 -r bash -n

      - name: Check whitespace in diff
        run: git diff --check HEAD

  package-lifecycle:
    name: Package Lifecycle
    runs-on: ubuntu-latest
    needs: syntax
    if: github.event_name == 'workflow_dispatch' && inputs.run_lifecycle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f .github/test/Dockerfile -t luma-test .

      - name: Run package lifecycle test
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.package }}" ]]; then
            docker run --rm --privileged luma-test "${{ inputs.package }}"
          else
            docker run --rm --privileged luma-test
          fi

  distro-matrix:
    name: Distro Matrix
    runs-on: ubuntu-latest
    needs: syntax
    if: github.event_name == 'workflow_dispatch' && inputs.run_matrix
    strategy:
      fail-fast: false
      matrix:
        distro:
          - alt-p11
          - debian-13
          - ubuntu-24.04
          - fedora
          - arch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run distro build test
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.package }}" ]]; then
            LUMA_DISTROS="${{ matrix.distro }}" ./.github/test/test-distros.sh "${{ inputs.package }}"
          else
            LUMA_DISTROS="${{ matrix.distro }}" ./.github/test/test-distros.sh
          fi
